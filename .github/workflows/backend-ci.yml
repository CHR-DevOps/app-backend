name: Backend CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main

permissions:
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint 2>&1 | tee /tmp/lint-output.txt

      - name: Comment on PR lint failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            let output = ''
            try { output = fs.readFileSync('/tmp/lint-output.txt', 'utf8') } catch (e) {}
            if (output.length > 3000) output = output.slice(0, 3000) + '\n...(truncated)'
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ **Lint failed** on \`${{ github.sha }}\` — fix these errors before tests can run.\n\n\`\`\`\n${output}\n\`\`\`\n\n[View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            })

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test 2>&1 | tee /tmp/test-output.txt

      - name: Comment on PR test failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            let output = ''
            try { output = fs.readFileSync('/tmp/test-output.txt', 'utf8') } catch (e) {}
            if (output.length > 3000) output = output.slice(0, 3000) + '\n...(truncated)'
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ **Tests failed** on \`${{ github.sha }}\`.\n\n\`\`\`\n${output}\n\`\`\`\n\n[View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            })